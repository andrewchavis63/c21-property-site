name: SIGNAL Weekly Pull

on:
  schedule:
    - cron: "7 7 * * 1"
      timezone: "America/Chicago"
  workflow_dispatch:

jobs:
  signal-pull:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SIGNAL pull
        env:
          RENTCAST_API_KEY:    ${{ secrets.RENTCAST_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/signal_pull.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal/data.json signal/brief.md signal/brief.html signal/archive/
          git diff --staged --quiet || git commit -m "chore: SIGNAL weekly pull $(date -u +%Y-%m-%d) [skip netlify]"
          git push
